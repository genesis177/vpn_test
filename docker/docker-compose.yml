version: "3.9"

services:
  vpn-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tun-vpn-server
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      KEYSTORE_PATH: /app/keystore.jks
      KEYSTORE_PASSWORD: changeit
    volumes:
      - ./keystore.jks:/app/keystore.jks:ro
    sysctls:
      - net.ipv4.ip_forward=1
    cap_add:
      - NET_ADMIN
